services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $authPublicKey: '%dimkinthepro_jwt_auth.config.public_key_path%'
            $authPrivateKey: '%dimkinthepro_jwt_auth.config.private_key_path%'
            $authPassphrase: '%dimkinthepro_jwt_auth.config.passphrase%'
            $authJwtTokenTtl: '%dimkinthepro_jwt_auth.config.token_ttl%'
            $authAlgorithm: '%dimkinthepro_jwt_auth.config.algorithm%'
            $authRefreshTokenTtl: '%dimkinthepro_jwt_auth.config.refresh_token_ttl%'
            $authRefreshTokenLength: '%dimkinthepro_jwt_auth.config.refresh_token_length%'
            $authIssuer: '%dimkinthepro_jwt_auth.config.issuer%'
            $authAudience: '%dimkinthepro_jwt_auth.config.audience%'
            $authClockSkewLeeway: '%dimkinthepro_jwt_auth.config.clock_skew_leeway%'
            $authBlocklistEnabled: '%dimkinthepro_jwt_auth.config.blocklist_enabled%'

    Dimkinthepro\JwtAuth\:
        resource: '../../'
        exclude:
            - '../../DependencyInjection/*'
            - '../../Domain/Entity/*'
            - '../../Domain/ValueObject/*'
            - '../../**/*Enum.php'
            - '../../**/*Exception.php'
            - '../../**/*Event.php'
            - '../../**/*Dto.php'

    Dimkinthepro\JwtAuth\Infrastructure\Controller\TokenRefreshAction:
        tags: ['controller.service_arguments']

    Dimkinthepro\JwtAuth\Infrastructure\Controller\SessionListAction:
        tags: ['controller.service_arguments']

    Dimkinthepro\JwtAuth\Infrastructure\Controller\SessionRevokeAction:
        tags: ['controller.service_arguments']

    Dimkinthepro\JwtAuth\Infrastructure\Controller\SessionRevokeAllAction:
        tags: ['controller.service_arguments']
